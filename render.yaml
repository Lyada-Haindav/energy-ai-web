services:
  - type: web
    name: energy-ai-web
    runtime: node
    plan: free
    buildCommand: npm install --prefix client --include=dev && npm install --prefix server && npm run build --prefix client
    startCommand: NODE_ENV=production npm start --prefix server
    healthCheckPath: /api/health
    envVars:
      - key: BREVO_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_FROM_NAME
        value: Energy AI
