services:
  - type: web
    name: energy-ai-web
    runtime: node
    plan: free
    buildCommand: npm install --prefix client && npm install --prefix server && npm run build --prefix client
    startCommand: npm start --prefix server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGIN
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_FROM_NAME
        value: Energy AI
